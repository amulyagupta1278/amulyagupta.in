name: 🔍 Daily SEO Audit

on:
  schedule:
    - cron: '0 23 * * *'  # 4:30 AM IST = 11:00 PM UTC
  workflow_dispatch:
    inputs:
      skill_override:
        description: 'Skill number to run (1-23, leave empty for scheduled rotation)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  seo-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: seo/requirements.txt

      - name: Install SEO Dependencies
        run: pip install -r seo/requirements.txt

      - name: Run Daily SEO Skill
        id: seo_skill
        run: python seo/run_skill.py
        env:
          SKILL_OVERRIDE: ${{ inputs.skill_override }}
          SITE_URL: https://amulyagupta.in
          GOOGLE_PAGESPEED_API_KEY: ${{ secrets.GOOGLE_PAGESPEED_API_KEY }}

      - name: Commit SEO History and Auto-Fixes
        run: |
          git config user.name "SEO Automation Bot"
          git config user.email "actions@github.com"
          git add seo/history/ seo/reports/ 2>/dev/null || true
          git add *.html 2>/dev/null || true
          git add blog/*.html 2>/dev/null || true
          git add robots.txt sitemap.xml llms.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "seo: daily audit — ${{ steps.seo_skill.outputs.skill_name }} | score ${{ steps.seo_skill.outputs.health_score }}/100 [skip ci]"
          git push -u origin claude/hopeful-wozniak-0YtQK || echo "Nothing to push"

      - name: Send Email Report
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🔍 SEO Report | ${{ steps.seo_skill.outputs.skill_name }} | Score: ${{ steps.seo_skill.outputs.health_score }}/100"
          to: ${{ secrets.EMAIL_TO }}
          from: "SEO Bot <${{ secrets.EMAIL_USERNAME }}>"
          html_body: file://seo/reports/latest_email.html

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seo-report-skill-${{ steps.seo_skill.outputs.skill_number }}-${{ github.run_id }}
          path: seo/reports/
          retention-days: 90
