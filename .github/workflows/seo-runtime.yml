name: SEO Autonomous Runtime

# ─────────────────────────────────────────────────────────────────────────────
# Mandatory governance — 7 Hard Stops enforced at every execution:
#
#   HS1  CLAUDE_SEO_SKILL_EXECUTION_ONLY
#        Exactly ONE skill per day, sequential 23-day rotation, no batching.
#
#   HS2  NO_AUTO_MERGE_OR_DIRECT_PUSH
#        Runtime never merges PRs, never pushes to main, never self-approves.
#        All remediation: Runtime -> PR -> Human Review -> Manual Merge.
#
#   HS3  DASHBOARD_AND_OBSERVABILITY_REQUIRED
#        Local JSON + Google Sheets persistence; dashboard auto-refreshes.
#
#   HS4  RUNTIME_VALIDATION_REQUIRED
#        Pre-execution context validation; no skill runs on invalid state.
#
#   HS5  GOOGLE_SHEETS_PERSISTENT_MEMORY
#        All history sheets are append-only; no clear/overwrite operations.
#
#   HS6  EXPERIMENTAL_BRANCH_ISOLATION
#        Only validated infrastructure on seo-runtime-stable or main.
#
#   HS7  CAVEMAN_CREDIT_OPTIMIZATION
#        Execution mode suppresses verbose context; Humaniser (emailer)
#        runs post-execution only.
#
# Skill group advancement:
#   Phase 1 (Group 1)  -- Robots/Sitemap, Meta/OG, Internal Linking, Headings
#   Phase 2 (Group 2)  -- Crawl Audit, Schema, CWV, Images, Mobile, Page Speed
#   Phase 3 (Group 3)  -- All 23 skills active  <- CURRENT DEFAULT
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Daily trigger (23:00 UTC = 04:30 IST) — drives the seo-runtime job.
    # The seo-runtime job condition excludes the Sunday-only trigger below
    # to prevent double-execution on Sundays.
    - cron: '0 23 * * *'
    # Sunday-only trigger — drives the weekly-summary job exclusively.
    # Using a separate cron (rather than a bash date check) means github.event.schedule
    # is set at dispatch time, immune to runner backlog timezone races.
    - cron: '0 23 * * 0'
  workflow_dispatch:
    inputs:
      skill_override:
        description: 'Force a specific skill (1-23) or leave blank for auto-rotation'
        required: false
        default: 'auto'
      enabled_skill_group:
        description: 'Skill group: 1=Foundational, 2=+Technical, 3=+Advanced (all 23)'
        required: false
        type: choice
        default: '3'
        options:
          - '1'
          - '2'
          - '3'
      force_init:
        description: 'Force re-initialise Sheets structure (use only on first deploy)'
        required: false
        type: boolean
        default: false
      send_weekly_summary:
        description: 'Send a weekly SEO summary email in addition to the daily brief'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: seo-runtime
  cancel-in-progress: false

jobs:
  # ── Daily SEO skill execution ────────────────────────────────────────────────
  seo-runtime:
    name: "SEO Skill Runtime — Group ${{ github.event.inputs.enabled_skill_group || '3' }} (All 23 Skills)"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Run on all schedule triggers (daily + Sunday) and on manual dispatch.
    # Both crons fire at 23:00 UTC; the weekly-summary job has its own condition
    # to restrict to Sundays, so this job safely handles all scheduled events.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: seo/requirements.txt

      - name: Install dependencies
        run: pip install -r seo/requirements.txt

      - name: Run SEO Runtime
        working-directory: seo
        env:
          SITE_URL: https://amulyagupta.in
          REPORT_EMAIL: amulyagupta2001@gmail.com
          SKILL_OVERRIDE: ${{ github.event.inputs.skill_override || 'auto' }}
          ENABLED_SKILL_GROUP: ${{ github.event.inputs.enabled_skill_group || '3' }}
          FORCE_INIT: ${{ github.event.inputs.force_init || 'false' }}
          SEND_WEEKLY_SUMMARY: ${{ github.event.inputs.send_weekly_summary || 'false' }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_SENDER: ${{ secrets.EMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEEDKEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GOOGLE_SEARCH_CONSOLE_CREDENTIALS: ${{ secrets.GOOGLE_SEARCH_CONSOLE_CREDENTIALS }}
          GOOGLE_ANALYTICS_CREDENTIALS: ${{ secrets.GOOGLE_ANALYTICS_CREDENTIALS }}
        run: python runtime.py

      - name: Email credential check
        if: always()
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          if [ -z "$EMAIL_USERNAME" ] || [ -z "$EMAIL_PASSWORD" ]; then
            echo "::error::Gmail credentials not configured — daily SEO email will be SKIPPED every run. Fix: go to Settings → Secrets → Actions and add EMAIL_USERNAME (your Gmail address) and EMAIL_PASSWORD (a Gmail App Password — see https://myaccount.google.com/apppasswords)."
          else
            echo "Gmail credentials present — email delivery enabled."
          fi

      - name: Run SEO Fixer and Create Fix PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Capture exit code without triggering bash -e on non-zero exits.
          # Exit 0 = fixes written, Exit 2 = nothing to fix, Exit 1 = error.
          FIXER_EXIT=0
          python seo/fixer.py || FIXER_EXIT=$?

          if [ "$FIXER_EXIT" -eq 2 ]; then
            echo "No fixable issues this run — skipping PR creation."
            exit 0
          fi
          if [ "$FIXER_EXIT" -ne 0 ]; then
            echo "::error::seo/fixer.py failed with exit code $FIXER_EXIT — check output above."
            exit 0
          fi

          # Guard: skip if an open seo-fix PR already exists (avoid daily duplicates)
          OPEN_COUNT=$(gh pr list --base main --state open --json headRefName \
            --jq '[.[] | select(.headRefName | startswith("seo-fix/"))] | length' 2>/dev/null || echo "0")
          if [ "$OPEN_COUNT" -gt 0 ]; then
            echo "::warning::An open SEO fix PR already exists — skipping duplicate creation. Merge or close the existing seo-fix/* PR first."
            exit 0
          fi

          # Collect site-content files modified by fixer (exclude seo/ runtime data)
          CHANGED=$(git diff --name-only | grep -v '^seo/')
          if [ -z "$CHANGED" ]; then
            echo "Fixer reported exit 0 but no site file changes detected — skipping PR."
            exit 0
          fi

          BRANCH="seo-fix/run-${{ github.run_number }}"
          git config user.name "SEO Runtime Bot"
          git config user.email "seo-bot@amulyagupta.in"
          git checkout -b "$BRANCH"
          echo "$CHANGED" | xargs git add --
          git commit -m "fix(seo): auto-fixes from run #${{ github.run_number }} [seo-fixer]"
          git push -u origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "SEO Auto-Fix: Run #${{ github.run_number }}" \
            --body "$(cat seo/data/pr_body.txt)" \
            --base main \
            --head "$BRANCH" 2>&1) \
            && echo "PR created: $PR_URL" \
            || { echo "::warning::gh pr create failed — branch pushed, create PR manually from $BRANCH."; PR_URL=""; }

          # Send PR notification email if PR was created
          if [ -n "$PR_URL" ]; then
            python3 -c "
import os, sys
sys.path.insert(0, 'seo')
import emailer, memory
runs = memory.load_runs()
last = runs[-1] if runs else {}
pr_url = '''$PR_URL'''
pr_body = open('seo/data/pr_body.txt').read()
html = f'''<!DOCTYPE html><html><head><meta charset=\"UTF-8\"></head>
<body style=\"margin:0;padding:32px;background:#f1f5f9;font-family:-apple-system,sans-serif;\">
<div style=\"max-width:640px;margin:0 auto;\">
  <div style=\"background:linear-gradient(135deg,#0f172a,#1e3a5f);border-radius:14px;padding:28px;margin-bottom:20px;\">
    <h1 style=\"color:#fff;margin:0 0 6px;font-size:20px;\">&#x2705; SEO Auto-Fix PR Created</h1>
    <p style=\"color:#94a3b8;margin:0;font-size:13px;\">Run #{last.get('run_id','?')} &middot; Skill {last.get('skill_id','?')}/23 &middot; {last.get('skill_name','')}</p>
  </div>
  <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:22px;margin-bottom:16px;\">
    <p style=\"margin:0 0 16px;font-size:14px;color:#1e293b;\">The SEO Auto-Fixer generated fixes and opened a pull request. <strong>Human review and manual merge required.</strong></p>
    <a href=\"{pr_url}\" style=\"display:inline-block;background:#0284c7;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;\">&#x1F517; Review PR on GitHub</a>
  </div>
  <div style=\"background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:18px;\">
    <pre style=\"margin:0;font-size:11px;color:#475569;white-space:pre-wrap;font-family:monospace;\">{pr_body[:1200]}</pre>
  </div>
  <p style=\"text-align:center;color:#94a3b8;font-size:11px;margin-top:16px;\">SEO Runtime Bot 2.0 &middot; amulyagupta.in</p>
</div></body></html>'''
ok = emailer.send_report(
    f'[SEO FIX PR] Auto-Fix Created — Run #{last.get(\"run_id\",\"?\")} | Review Required',
    html,
    f'SEO Auto-Fix PR created: {pr_url}\n\nReview and merge required.\n\n{pr_body[:500]}'
)
print('PR notification email sent.' if ok else 'PR notification email failed (non-fatal).')
"
          fi

          # Return to original branch so the dashboard-data commit step works on main
          git checkout "${{ github.ref_name }}"

      - name: Commit dashboard data
        if: always()
        run: |
          # seo/data/ contains only JSON observability telemetry — NOT site-content.
          # We always target main so the GitHub Pages dashboard is live regardless
          # of which branch (feature or main) triggered this workflow run.
          git config user.name "SEO Runtime Bot"
          git config user.email "seo-bot@amulyagupta.in"

          # Snapshot the freshly generated data files before any branch switch.
          mkdir -p /tmp/seo-data-snapshot
          cp seo/data/*.json /tmp/seo-data-snapshot/ 2>/dev/null || true

          # Ensure we have the latest main to avoid non-fast-forward failures.
          git fetch origin main --quiet

          # Switch to main (safe — we've saved the data files above).
          git checkout main

          # Apply the snapshot onto main.
          cp /tmp/seo-data-snapshot/*.json seo/data/ 2>/dev/null || true

          git add seo/data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(seo): update dashboard telemetry -- $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            if git push origin main; then
              echo "Dashboard data pushed to main — live dashboard updated."
            else
              echo "::warning::Push to main failed — data preserved as workflow artifact."
            fi
          fi

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-run-${{ github.run_number }}-${{ github.run_attempt }}
          path: seo/data/
          if-no-files-found: warn
          retention-days: 90

  # ── Weekly Summary (Sundays 23:00 UTC = Monday 04:30 IST) ───────────────────
  # Triggered only by the Sunday-only cron (0 23 * * 0) or manual dispatch.
  # Using github.event.schedule (set at dispatch time) is immune to runner
  # backlog timezone races that would affect a bash date +%u check.
  weekly-summary:
    name: "SEO Weekly Summary Email"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 23 * * 0') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.send_weekly_summary == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: seo/requirements.txt

      - name: Install dependencies
        run: pip install -r seo/requirements.txt

      - name: Send weekly summary
        working-directory: seo
        env:
          SITE_URL: https://amulyagupta.in
          REPORT_EMAIL: amulyagupta2001@gmail.com
          GMAIL_SENDER: ${{ secrets.EMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SKILL_OVERRIDE: 'auto'
          ENABLED_SKILL_GROUP: '3'
          SEND_WEEKLY_SUMMARY: 'true'
        run: python weekly_summary.py
