name: SEO Autonomous Runtime

# ─────────────────────────────────────────────────────────────────────────────
# Governance — 7 Hard Stops enforced on every execution:
#
#   HS1  One skill per day, strict 23-day sequential rotation.
#   HS2  NO auto-merge. Runtime NEVER commits to main.
#        Flow: Runtime → seo/skill-XX branch → PR → Human Review → Manual Merge.
#   HS3  Dashboard + Google Sheets observability required.
#   HS4  Pre-execution context validation; no skill runs on invalid state.
#   HS5  Google Sheets history sheets are append-only.
#   HS6  Experimental branch isolation.
#   HS7  Caveman execution mode / Humaniser reporting separation.
#
# Branch strategy:
#   Scheduled cron runs on main (GitHub platform constraint).
#   Python runtime writes findings to working tree — no git commits.
#   Workflow then creates seo/skill-XX branch from main HEAD,
#   commits all outputs there, and opens a PR for human review.
#   main is NEVER committed to by this workflow.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 23:00 UTC = 04:30 AM IST (UTC+5:30)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      skill_override:
        description: 'Force a specific skill (1–23) or leave blank for auto-rotation'
        required: false
        default: 'auto'
      enabled_skill_group:
        description: 'Skill group: 1=Foundational, 2=+Technical, 3=+Advanced (all 23 skills)'
        required: false
        default: '3'
      force_init:
        description: 'Force re-initialise Sheets structure (first deploy only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: seo-runtime
  cancel-in-progress: false

jobs:
  seo-runtime:
    name: "SEO Skill Runtime (Group ${{ github.event.inputs.enabled_skill_group || '3' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Full history so we can create branches and push PRs
          fetch-depth: 0

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: seo/requirements.txt

      - name: Install dependencies
        run: pip install -r seo/requirements.txt

      # ── 3. Run SEO skill (no git operations — writes to working tree only) ───
      - name: Run SEO Runtime
        working-directory: seo
        env:
          SITE_URL: https://amulyagupta.in
          REPORT_EMAIL: amulagupta2001@gmail.com
          SKILL_OVERRIDE: ${{ github.event.inputs.skill_override || 'auto' }}
          ENABLED_SKILL_GROUP: ${{ github.event.inputs.enabled_skill_group || '3' }}
          FORCE_INIT: ${{ github.event.inputs.force_init || 'false' }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python runtime.py

      # ── 4. Create skill branch and commit all runtime outputs ────────────────
      # The runtime wrote files to the working tree while on main.
      # We create seo/skill-XX from main's HEAD — the working tree is preserved —
      # then commit and push. main is never touched.
      - name: Create skill branch and commit findings
        if: always()
        id: skill_branch
        run: |
          # Read which skill just ran — state.json is primary, runs.json is fallback
          SKILL_ID=$(python3 -c "
          import json, sys
          # Primary: state.json written by runtime at end of run
          try:
              with open('seo/data/state.json') as f:
                  sid = json.load(f).get('last_skill_id', 0)
                  if sid: print(sid); sys.exit(0)
          except Exception:
              pass
          # Fallback: last entry in runs.json
          try:
              with open('seo/data/runs.json') as f:
                  runs = json.load(f)
                  if runs: print(runs[-1].get('skill_id', 0)); sys.exit(0)
          except Exception:
              pass
          print(0)
          " 2>/dev/null || echo "0")

          if [ "$SKILL_ID" = "0" ] || [ -z "$SKILL_ID" ]; then
            echo "Could not determine skill ID — skipping branch creation"
            echo "branch_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SKILL_PADDED=$(printf '%02d' "$SKILL_ID")
          BRANCH="seo/skill-${SKILL_PADDED}"

          SKILL_NAME=$(python3 -c "
          import sys; sys.path.insert(0, 'seo')
          import config
          print(config.SKILL_NAMES[int('$SKILL_ID') - 1])
          " 2>/dev/null || echo "Skill $SKILL_ID")

          SCORE=$(python3 -c "
          import json
          try:
              runs = json.load(open('seo/data/runs.json'))
              print(runs[-1].get('score', 0) if runs else 0)
          except:
              print(0)
          " 2>/dev/null || echo "0")

          CRITICAL=$(python3 -c "
          import json
          try:
              runs = json.load(open('seo/data/runs.json'))
              print(runs[-1].get('issues_critical', 0) if runs else 0)
          except:
              print(0)
          " 2>/dev/null || echo "0")

          echo "Skill:  ${SKILL_PADDED} — ${SKILL_NAME}"
          echo "Score:  ${SCORE}/100  (${CRITICAL} critical)"
          echo "Branch: ${BRANCH}"

          git config user.name  "SEO Runtime Bot"
          git config user.email "seo-bot@amulyagupta.in"

          # Create branch at current HEAD (= main's latest commit).
          # Working tree with all runtime-generated files is preserved.
          git checkout -B "$BRANCH"

          # Stage only the runtime outputs — no other files are touched.
          git add seo/reports/ seo/data/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "branch_created=false" >> "$GITHUB_OUTPUT"
          else
            TODAY=$(date -u +%Y-%m-%d)
            git commit -m "seo(skill-${SKILL_PADDED}): ${SKILL_NAME} — Score ${SCORE}/100 — ${TODAY}

Findings: ${CRITICAL} critical | Auto-generated audit report
Skill ${SKILL_ID}/23 in the 23-day SEO rotation cycle

Review the report in seo/reports/ and merge when satisfied,
or close this PR to skip this cycle's findings."

            git push -f origin "$BRANCH"
            echo "Pushed to origin/${BRANCH}"
            echo "branch_created=true"  >> "$GITHUB_OUTPUT"
          fi

          # Export for the PR step
          echo "skill_id=$SKILL_ID"       >> "$GITHUB_OUTPUT"
          echo "skill_padded=$SKILL_PADDED" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH"           >> "$GITHUB_OUTPUT"
          echo "skill_name=$SKILL_NAME"   >> "$GITHUB_OUTPUT"
          echo "score=$SCORE"             >> "$GITHUB_OUTPUT"
          echo "critical=$CRITICAL"       >> "$GITHUB_OUTPUT"

      # ── 5. Open or update Pull Request ──────────────────────────────────────
      # One open PR per skill branch at most.
      # If the skill ran before and the PR was merged, a fresh PR is created.
      # If the previous PR is still open, its title is refreshed with the latest score.
      - name: Create or update Pull Request
        if: steps.skill_branch.outputs.branch_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.skill_branch.outputs.branch }}"
          SKILL_ID="${{ steps.skill_branch.outputs.skill_id }}"
          SKILL_PADDED="${{ steps.skill_branch.outputs.skill_padded }}"
          SKILL_NAME="${{ steps.skill_branch.outputs.skill_name }}"
          SCORE="${{ steps.skill_branch.outputs.score }}"
          CRITICAL="${{ steps.skill_branch.outputs.critical }}"
          TODAY=$(date -u +%Y-%m-%d)

          PR_TITLE="[SEO Audit] Skill ${SKILL_PADDED}/23 — ${SKILL_NAME} — Score ${SCORE}/100"

          # Use the generated markdown report as the PR body
          REPORT_FILE=$(ls seo/reports/*.md 2>/dev/null | sort | tail -1 || echo "")
          if [ -n "$REPORT_FILE" ] && [ -f "$REPORT_FILE" ]; then
            BODY_SOURCE="$REPORT_FILE"
          else
            # Fallback body if no report file
            FALLBACK_BODY="## SEO Audit — Skill ${SKILL_PADDED}/23: ${SKILL_NAME}

| Field | Value |
|---|---|
| **Score** | ${SCORE}/100 |
| **Critical Issues** | ${CRITICAL} |
| **Date** | ${TODAY} |
| **Branch** | \`${BRANCH}\` |

See \`seo/reports/\` and \`seo/data/\` in this PR for full findings.

> Merge to accept findings and update the live dashboard.
> Close to skip this cycle's findings."
            BODY_SOURCE=$(mktemp --suffix=.md)
            echo "$FALLBACK_BODY" > "$BODY_SOURCE"
          fi

          # Check for an existing open PR from this skill branch
          EXISTING=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Updating existing PR #${EXISTING} with latest score"
            gh pr edit "$EXISTING" --title "$PR_TITLE"
            echo "✅ PR #${EXISTING} updated: ${PR_TITLE}"
          else
            echo "Creating new PR: ${BRANCH} → main"
            PR_URL=$(gh pr create \
              --title "$PR_TITLE" \
              --body-file "$BODY_SOURCE" \
              --base main \
              --head "$BRANCH")
            echo "✅ PR created: ${PR_URL}"
          fi

      # ── 6. Upload artifacts (always, regardless of outcome) ─────────────────
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-run-${{ github.run_number }}
          path: |
            seo/data/
            seo/reports/
          retention-days: 90
