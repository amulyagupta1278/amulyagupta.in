name: SEO Autonomous Runtime

# ─────────────────────────────────────────────────────────────────────────────
# Mandatory governance — 7 Hard Stops enforced at every execution:
#
#   HS1  CLAUDE_SEO_SKILL_EXECUTION_ONLY
#        Exactly ONE skill per day, sequential 23-day rotation, no batching.
#
#   HS2  NO_AUTO_MERGE_OR_DIRECT_PUSH
#        Runtime never merges PRs, never pushes to main, never self-approves.
#        All remediation: Runtime → PR → Human Review → Manual Merge.
#
#   HS3  DASHBOARD_AND_OBSERVABILITY_REQUIRED
#        Local JSON + Google Sheets persistence; dashboard auto-refreshes.
#
#   HS4  RUNTIME_VALIDATION_REQUIRED
#        Pre-execution context validation; no skill runs on invalid state.
#
#   HS5  GOOGLE_SHEETS_PERSISTENT_MEMORY
#        All history sheets are append-only; no clear/overwrite operations.
#
#   HS6  EXPERIMENTAL_BRANCH_ISOLATION
#        Only validated infrastructure on seo-runtime-stable or main.
#
#   HS7  CAVEMAN_CREDIT_OPTIMIZATION
#        Execution mode suppresses verbose context; Humaniser (emailer)
#        runs post-execution only.
#
# Phased rollout — advance ENABLED_SKILL_GROUP as each phase stabilises:
#   Phase 1 (Group 1)  — Robots/Sitemap, Meta/OG, Internal Linking, Headings
#   Phase 2 (Group 2)  — Crawl Audit, Schema, CWV, Images, Mobile, Page Speed
#   Phase 3 (Group 3)  — All 23 skills active
#
# Branch strategy:
#   Scheduled runs always execute on seo-runtime-stable (never on main).
#   Hard Stop 2 blocks any commit to main/master — data lives on stable branch.
#   The admin dashboard at /admin/seo/ reads live data from seo-runtime-stable
#   via the public GitHub raw content URL.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 23:00 UTC = 04:30 AM IST (UTC+5:30)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      skill_override:
        description: 'Force a specific skill (1–23) or leave blank for auto-rotation'
        required: false
        default: 'auto'
      enabled_skill_group:
        description: 'Skill group to activate: 1=Foundational, 2=+Technical, 3=+Advanced'
        required: false
        default: '1'
      force_init:
        description: 'Force re-initialise Sheets structure (use only on first deploy)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: seo-runtime
  cancel-in-progress: false

jobs:
  seo-runtime:
    name: "SEO Skill Runtime (Group ${{ github.event.inputs.enabled_skill_group || '1' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # Always checkout seo-runtime-stable — scheduled runs fire from the default
      # branch (main) but Hard Stop 2 prohibits any commit to main. We explicitly
      # check out the stable runtime branch so all data commits are safe.
      - name: Checkout seo-runtime-stable
        uses: actions/checkout@v4
        with:
          ref: seo-runtime-stable
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: seo/requirements.txt

      - name: Install dependencies
        run: pip install -r seo/requirements.txt

      - name: Initialize Google Sheets structure (first run or forced)
        if: ${{ github.event.inputs.force_init == 'true' }}
        working-directory: seo
        env:
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python - <<'PYEOF'
          import sys, os
          sys.path.insert(0, '.')
          from sheets import SheetsClient
          sc = SheetsClient()
          if sc.available:
              ok = sc.initialize_all_sheets()
              print(f"Sheets initialized: {ok}")
          else:
              print("Sheets unavailable — skipping init")
          PYEOF

      - name: Run SEO Runtime
        working-directory: seo
        env:
          SITE_URL: https://amulyagupta.in
          REPORT_EMAIL: amulyagupta2001@gmail.com
          SKILL_OVERRIDE: ${{ github.event.inputs.skill_override || 'auto' }}
          ENABLED_SKILL_GROUP: ${{ github.event.inputs.enabled_skill_group || '1' }}
          FORCE_INIT: ${{ github.event.inputs.force_init || 'false' }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Hard Stop 2: always report as seo-runtime-stable — blocks any main commit
          GITHUB_REF: refs/heads/seo-runtime-stable
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python runtime.py

      - name: Commit dashboard data to seo-runtime-stable
        if: always()
        run: |
          git config user.name "SEO Runtime Bot"
          git config user.email "seo-bot@amulyagupta.in"
          git add seo/data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(seo): update dashboard data $(date -u +%Y-%m-%dT%H:%M)Z [skip ci]"
            # Retry push with exponential backoff (network resilience)
            for delay in 2 4 8 16; do
              git push origin seo-runtime-stable && break
              echo "Push failed — retrying in ${delay}s..."
              sleep $delay
            done || echo "Push exhausted retries — data preserved in artifact"
          fi

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-run-${{ github.run_number }}
          path: seo/data/
          retention-days: 90
