name: SEO Autonomous Runtime

# ─────────────────────────────────────────────────────────────────────────────
# Phased rollout — advance ENABLED_SKILL_GROUP as each phase stabilises:
#
#   Phase 1 (Group 1)  — Robots/Sitemap, Meta/OG, Internal Linking, Headings
#   Phase 2 (Group 2)  — Crawl Audit, Schema, CWV, Images, Mobile, Page Speed
#   Phase 3 (Group 3)  — All 23 skills active
#
# Safety rules:
#   • Exactly ONE skill runs per execution — strict rotational model
#   • All site fixes are proposed via PR only — never auto-merged
#   • Runtime will not push to main under any circumstance
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 23:00 UTC = 04:30 AM IST (UTC+5:30)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      skill_override:
        description: 'Force a specific skill (1–23) or leave blank for auto-rotation'
        required: false
        default: 'auto'
      enabled_skill_group:
        description: 'Skill group to activate: 1=Foundational, 2=+Technical, 3=+Advanced'
        required: false
        default: '1'
      force_init:
        description: 'Force re-initialise Sheets structure (use only on first deploy)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: seo-runtime
  cancel-in-progress: false

jobs:
  seo-runtime:
    name: "SEO Skill Runtime (Group ${{ github.event.inputs.enabled_skill_group || '1' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: seo/requirements.txt

      - name: Install dependencies
        run: pip install -r seo/requirements.txt

      - name: Run SEO Runtime
        working-directory: seo
        env:
          SITE_URL: https://amulyagupta.in
          REPORT_EMAIL: amulagupta2001@gmail.com
          SKILL_OVERRIDE: ${{ github.event.inputs.skill_override || 'auto' }}
          ENABLED_SKILL_GROUP: ${{ github.event.inputs.enabled_skill_group || '1' }}
          FORCE_INIT: ${{ github.event.inputs.force_init || 'false' }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python runtime.py

      - name: Commit dashboard data
        if: always()
        run: |
          git config user.name "SEO Runtime Bot"
          git config user.email "seo-bot@amulyagupta.in"
          git add seo/data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(seo): update dashboard data [skip ci]"
            git push origin ${{ github.ref_name }} \
              || echo "Push failed — data preserved in artifact"
          fi

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-run-${{ github.run_number }}
          path: seo/data/
          retention-days: 90
