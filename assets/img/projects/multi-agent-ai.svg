<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 410">
  <defs>
    <marker id="ac" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#38BDF8"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#1A73E8"/>
    </marker>
  </defs>

  <rect width="860" height="410" fill="#0B0E17" rx="10"/>

  <text x="430" y="27" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#38BDF8" font-weight="700" letter-spacing="2">MULTI-AGENT ARCHITECTURE · LangGraph</text>

  <!-- User Query -->
  <rect x="320" y="40" width="220" height="48" rx="8" fill="#0e1628" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="430" y="59" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#6b7ba4" letter-spacing="1">INPUT</text>
  <text x="430" y="78" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#F0F6FF" font-weight="600">User Research Query</text>

  <line x1="430" y1="88" x2="430" y2="122" stroke="#38BDF8" stroke-width="1.5" marker-end="url(#ac)"/>

  <!-- Orchestrator -->
  <rect x="140" y="126" width="580" height="52" rx="8" fill="#0a1220" stroke="#38BDF8" stroke-width="2"/>
  <text x="430" y="146" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#38BDF8" letter-spacing="2">ORCHESTRATOR</text>
  <text x="430" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#F0F6FF" font-weight="700">LangGraph Supervisor Agent</text>

  <line x1="270" y1="178" x2="185" y2="228" stroke="#1A73E8" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="430" y1="178" x2="430" y2="228" stroke="#1A73E8" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="590" y1="178" x2="675" y2="228" stroke="#1A73E8" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- Research Agent -->
  <rect x="55" y="232" width="260" height="62" rx="8" fill="#141824" stroke="#1e2a45" stroke-width="1.5"/>
  <text x="185" y="249" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#6b7ba4">AGENT 01</text>
  <text x="185" y="267" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#F0F6FF" font-weight="600">Research Agent</text>
  <text x="185" y="285" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#6b7ba4">Web Search · Structured Summaries</text>

  <!-- Analysis Agent -->
  <rect x="300" y="232" width="260" height="62" rx="8" fill="#141824" stroke="#1e2a45" stroke-width="1.5"/>
  <text x="430" y="249" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#6b7ba4">AGENT 02</text>
  <text x="430" y="267" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#F0F6FF" font-weight="600">Analysis Agent</text>
  <text x="430" y="285" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#6b7ba4">Patterns · Gaps · Contradictions</text>

  <!-- Writing Agent -->
  <rect x="545" y="232" width="260" height="62" rx="8" fill="#141824" stroke="#1e2a45" stroke-width="1.5"/>
  <text x="675" y="249" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#6b7ba4">AGENT 03</text>
  <text x="675" y="267" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#F0F6FF" font-weight="600">Writing Agent</text>
  <text x="675" y="285" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#6b7ba4">Report · Citations · Tone</text>

  <line x1="185" y1="294" x2="310" y2="344" stroke="#1A73E8" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="430" y1="294" x2="430" y2="344" stroke="#1A73E8" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="675" y1="294" x2="550" y2="344" stroke="#1A73E8" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- Tool Layer -->
  <rect x="140" y="348" width="580" height="46" rx="8" fill="#141824" stroke="#1e2a45" stroke-width="1.5"/>
  <text x="430" y="366" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#6b7ba4">TOOL LAYER</text>
  <text x="430" y="384" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#F0F6FF">Web Search · Doc Parsing · Citation Extraction · Function Calling</text>
